# Tower Control – Packages-Datei (0.2.0)
#
# WICHTIG (0.2.0): Die OLED-Rotationsautomationen und Hilfs-Entities
# (tower_oled_current_page, tower_oled_rotation, tower_oled_preset, …)
# sind mit Version 0.2.0 DEPRECATED. Die Rotation läuft jetzt direkt
# in der Integration (Optionen → OLED-Seiten konfigurieren).
# Diese Automationen können entfernt werden, wenn kein Upgrade von 0.1.x
# mehr benötigt wird.
#
# NOCH RELEVANT: Der LED-Startup-Effekt am Ende dieser Datei.
#
# Voraussetzung: packages in /config/configuration.yaml aktivieren:
#   homeassistant:
#     packages: !include_dir_named packages
#
# Dann diese Datei nach /config/packages/tower_control.yaml kopieren.

# ---------------------------------------------------------------------------
# DEPRECATED seit 0.2.0 – Hilfs-Entities für OLED-Rotation
# (können entfernt werden wenn 0.2.0 Integrationsoptionen genutzt werden)
# ---------------------------------------------------------------------------

input_number:
  tower_oled_current_page:
    name: "Tower OLED Aktuelle Seite"
    initial: 1
    min: 1
    max: 3
    step: 1
    mode: box

input_select:
  tower_oled_preset:
    name: "Tower OLED Voreinstellung"
    options:
      - "Eigener Inhalt"
      - "System-Info"
      - "Entitäten"
    initial: "Eigener Inhalt"

input_text:
  tower_oled_entity_1:
    name: "Tower OLED Entität 1 (Entity-ID)"
    initial: ""
    max: 64
  tower_oled_entity_2:
    name: "Tower OLED Entität 2 (Entity-ID)"
    initial: ""
    max: 64

timer:
  tower_oled_rotation:
    name: "Tower OLED Rotation"

# ---------------------------------------------------------------------------
# DEPRECATED seit 0.2.0 – Automationen für OLED-Rotation
# ---------------------------------------------------------------------------

automation:

  # --- Rotation: Timer starten -----------------------------------------------
  # DEPRECATED: In 0.2.0 übernimmt die Integration die Rotation intern.
  - id: "tower_oled_rotation_start"
    alias: "Tower OLED – Rotation starten"
    description: >
      DEPRECATED seit 0.2.0 – nur noch für 0.1.x relevant.
      Startet den Rotationstimer beim HA-Start und bei Änderung der Wechselfrequenz.
    trigger:
      - platform: homeassistant
        event: start
      - platform: state
        entity_id: number.tower_hardware_oled_rotation_interval
    action:
      - service: timer.start
        target:
          entity_id: timer.tower_oled_rotation
        data:
          duration: >
            {{ states('number.tower_hardware_oled_rotation_interval') | int(30) }}
    mode: single

  # --- Rotation: Nächste Seite anzeigen --------------------------------------
  # DEPRECATED: In 0.2.0 übernimmt die Integration die Rotation intern.
  - id: "tower_oled_rotation_next"
    alias: "Tower OLED – Nächste Seite"
    description: >
      DEPRECATED seit 0.2.0 – nur noch für 0.1.x relevant.
      Zeigt beim Timer-Ablauf die nächste nicht-leere Seite auf dem OLED an.
    trigger:
      - platform: event
        event_type: timer.finished
        event_data:
          entity_id: timer.tower_oled_rotation
    action:
      - variables:
          next_page: >
            {{ (states('input_number.tower_oled_current_page') | int(1) % 3) + 1 }}
          text: >
            {%- if next_page == 1 -%}
              {{ states('text.tower_hardware_oled_page_1') }}
            {%- elif next_page == 2 -%}
              {{ states('text.tower_hardware_oled_page_2') }}
            {%- else -%}
              {{ states('text.tower_hardware_oled_page_3') }}
            {%- endif -%}
      - service: input_number.set_value
        target:
          entity_id: input_number.tower_oled_current_page
        data:
          value: "{{ next_page }}"
      - if:
          - condition: template
            value_template: "{{ text | trim != '' }}"
        then:
          - service: text.set_value
            target:
              entity_id: text.tower_hardware_oled_text
            data:
              value: "{{ text | trim }}"
      - service: timer.start
        target:
          entity_id: timer.tower_oled_rotation
        data:
          duration: >
            {{ states('number.tower_hardware_oled_rotation_interval') | int(30) }}
    mode: single

  # --- Preset: Seiteninhalte aktualisieren -----------------------------------
  # DEPRECATED: In 0.2.0 übernimmt die Integration die Rotation intern.
  - id: "tower_oled_preset_update"
    alias: "Tower OLED – Voreinstellung aktualisieren"
    description: >
      DEPRECATED seit 0.2.0 – nur noch für 0.1.x relevant.
    trigger:
      - platform: time_pattern
        minutes: "/1"
      - platform: state
        entity_id: input_select.tower_oled_preset
    condition:
      - condition: template
        value_template: >
          {{ states('input_select.tower_oled_preset') != 'Eigener Inhalt' }}
    action:
      - choose:
          - conditions:
              - condition: state
                entity_id: input_select.tower_oled_preset
                state: "System-Info"
            sequence:
              - service: text.set_value
                target:
                  entity_id: text.tower_hardware_oled_page_1
                data:
                  value: "HA Online"
              - service: text.set_value
                target:
                  entity_id: text.tower_hardware_oled_page_2
                data:
                  value: >
                    {{ now().strftime('%d.%m.%Y') }}\n{{ now().strftime('%H:%M:%S') }}
              - service: text.set_value
                target:
                  entity_id: text.tower_hardware_oled_page_3
                data:
                  value: >
                    CPU: {{ states('sensor.tower_hardware_cpu_temperature')
                           | float(0) | round(1) }} C
          - conditions:
              - condition: state
                entity_id: input_select.tower_oled_preset
                state: "Entitäten"
            sequence:
              - variables:
                  eid1: "{{ states('input_text.tower_oled_entity_1') }}"
                  eid2: "{{ states('input_text.tower_oled_entity_2') }}"
                  name1: >
                    {{ (state_attr(eid1, 'friendly_name') or eid1)[:10] }}
                  val1: "{{ states(eid1) }}"
                  name2: >
                    {{ (state_attr(eid2, 'friendly_name') or eid2)[:10] }}
                  val2: "{{ states(eid2) }}"
              - service: text.set_value
                target:
                  entity_id: text.tower_hardware_oled_page_1
                data:
                  value: >
                    {{ now().strftime('%d.%m.%Y') }}\n{{ now().strftime('%H:%M:%S') }}
              - service: text.set_value
                target:
                  entity_id: text.tower_hardware_oled_page_2
                data:
                  value: "{{ name1 }}\n{{ val1 }}"
              - service: text.set_value
                target:
                  entity_id: text.tower_hardware_oled_page_3
                data:
                  value: "{{ name2 }}\n{{ val2 }}"
    mode: single

  # ---------------------------------------------------------------------------
  # AKTIV – LED-Startup-Effekt (weiterhin relevant in 0.2.0)
  # ---------------------------------------------------------------------------

  # Schaltet die LED beim HA-Start auf den Regenbogen-Effekt.
  - id: "tower_led_startup_rainbow"
    alias: "Tower LED – Regenbogen beim Start"
    description: >
      Schaltet die LED beim HA-Start auf den Regenbogen-Effekt.
    trigger:
      - platform: homeassistant
        event: start
    action:
      - delay: "00:00:15"
      - service: light.turn_on
        target:
          entity_id: light.tower_hardware_led
        data:
          effect: "Rainbow"
    mode: single
